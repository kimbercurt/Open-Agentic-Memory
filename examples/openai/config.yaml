# Open Agentic Memory — OpenAI Configuration
models:
  primary:
    provider: "openai"
    model: "gpt-5.4"
    api_key_env: "OPENAI_API_KEY"
  fast:
    provider: "openai"
    model: "gpt-5.3-codex-spark"
    api_key_env: "OPENAI_API_KEY"
    thinking: "high"
embedding:
  provider: "openai"
  model: "text-embedding-3-small"
  api_key_env: "OPENAI_API_KEY"
  dimensions: 1536
storage:
  vector:
    backend: "qdrant"
    path: "./data/vector"
  database:
    backend: "sqlite"
    path: "./data/memory.db"
  vault:
    path: "./data/vault"
brains:
  - key: "assistant"
    name: "Assistant"
    description: "Primary AI assistant"
