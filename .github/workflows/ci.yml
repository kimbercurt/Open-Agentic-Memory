name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python files compile
        run: python -m py_compile serve_chat.py openclaw_setup.py src/agentic_memory/config.py src/agentic_memory/runtime.py

      - name: Verify setup script syntax
        run: bash -n setup.sh

      - name: Verify plugin JavaScript syntax
        run: |
          node --check plugins/recall-tools/index.js
          node --check plugins/observer-tools/index.js

      - name: Run test suite
        run: python -m unittest discover -s tests -v
