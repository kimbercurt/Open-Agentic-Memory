name: Bug Report
description: Report a reproducible problem in Open Agentic Memory
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        For security-sensitive issues, please use the process in `SECURITY.md` instead of opening a public issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: A short description of the problem.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share relevant versions and runtime details.
      placeholder: |
        - OS:
        - Python:
        - Install method:
        - Framework mode:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste logs, stack traces, or screenshots if they help.
      render: shell
